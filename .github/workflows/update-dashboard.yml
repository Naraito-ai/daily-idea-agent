name: Update Daily Trends and Ideas

on:
  schedule:
    # Run every day at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: 'false'
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Daily Scraper Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python agent.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        # Only commit and push if data.json was actually updated/changed
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes in data.json today."
        else
          git commit -m "Auto-update daily trends and ideas: $(date +'%Y-%m-%d')"
          git push
        fi
